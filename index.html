<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Back Office Product Generator</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --ink: #1f2a37;
        --muted: #5d6a7a;
        --accent: #126e5a;
        --accent-strong: #0c5747;
        --ring: #9edacc;
        --border: #d6dee8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #deefe8 0, transparent 35%),
          radial-gradient(circle at 90% 20%, #e7eefb 0, transparent 30%),
          var(--bg);
      }

      .shell {
        width: min(980px, 92vw);
        margin: 2rem auto;
      }

      .hero {
        background: linear-gradient(130deg, #0f4f44, #1a7763);
        color: #fff;
        padding: 1.25rem 1.4rem;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(18, 57, 49, 0.18);
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.2vw, 1.8rem);
      }

      .hero p {
        margin: 0.45rem 0 0;
        opacity: 0.95;
      }

      .panel {
        margin-top: 1rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
      }

      .grid {
        display: grid;
        gap: 0.85rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.72rem 0.8rem;
        font-size: 1rem;
      }

      input:focus {
        outline: 2px solid var(--ring);
        border-color: var(--accent);
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 0.72rem 1rem;
        font-size: 1rem;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .status {
        margin-top: 0.7rem;
        min-height: 1.3rem;
        color: var(--muted);
      }

      .products {
        margin-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }

      .product {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.85rem;
        background: #fff;
      }

      .product h3 {
        margin: 0;
      }

      .meta {
        margin: 0.2rem 0 0.5rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .empty {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Back Office Product Description Generator</h1>
        <p>Create a product and generate its description through MCP sampling + Ollama.</p>
      </section>

      <section class="panel">
        <form id="create-product-form" class="grid">
          <label>
            Product title
            <input id="title" name="title" placeholder="Noise-cancelling travel headset" required />
          </label>

          <label>
            Keywords
            <input id="keywords" name="keywords" placeholder="wireless, comfortable, long battery life" required />
          </label>

          <button id="submit-btn" type="submit">Generate Description</button>
        </form>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Created Products</h2>
        <div id="products" class="products"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
